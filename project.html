// 添加解析六参数的函数
function parse6Params(paramStr) {
    if (!paramStr) return null;
    
    const result = {};
    const lines = paramStr.split('\n');
    
    const paramMap = {
        '算术平均数随机权重a': 'a',
        '中位数随机权重b': 'b',
        '四分位数随机权重c': 'c',
        '几何平均数随机权重d': 'd',
        '算数平均数随机权重e': 'e',
        '中位数随机权重f': 'f',
        '几何平均数随机权重g': 'g',
        '比例系数C1': 'C1',
        '下浮系数r': 'r'
    };
    
    lines.forEach(line => {
        const trimmedLine = line.trim();  // 添加这行，去除首尾空格
        for (const [key, value] of Object.entries(paramMap)) {
            if (trimmedLine.startsWith(key)) {
                // 支持中文冒号和英文冒号
                const parts = trimmedLine.split(/[:：]/);
                if (parts.length > 1) {
                    result[value] = parseFloat(parts[1]);
                }
                break;
            }
        }
    });
    
    return result;
}

        // 信用评分分析功能
        async function analyzeScores() {
            try {
                if (!window.bid_openning_time) {
                    console.log('未找到开标时间，跳过信用评分分析');
                    return;
                }

                // 计算 score_time
                const openTime = new Date(window.bid_openning_time);
                let targetDate = new Date(openTime);
                
                // 如果是本月15日及之前，使用上个月
                if (openTime.getDate() <= 15) {
                    targetDate.setMonth(targetDate.getMonth() - 1);
                } else {
                     // 如果是本月16日及之后，使用本月
                     // 无需操作，targetDate 已经是本月
                }
                
                const year = targetDate.getFullYear();
                const month = String(targetDate.getMonth() + 1).padStart(2, '0');
                const scoreTime = `${year}-${month}`;
                
                console.log(`计算信用评分月份: 开标时间=${window.bid_openning_time}, 评分月份=${scoreTime}`);

                // 获取所有投标单位名称
                const companyNames = sortedBids.map(bid => bid.bid_corp_name);
                
                const baseUrl = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') 
                    ? 'http://localhost' 
                    : 'https://liubeijs.com';

                // 调用API

                    headers: {

                    },
                    body: JSON.stringify({

                const result = await response.json();
                console.log('信用评分结果:', result);

                    // 创建评分映射

                    result.forEach(item => {

                    renderBidList(sortedBids);
                }

                console.error('信用评分分析失败：', error);

                const centralEnterprises = [
                    '中国', '中交', '中建', '中铁', '中冶', '中核', '中能建', '中广核',
                    '中石油', '中石化', '中海油', '中粮', '中车', '中航', '中电', '中钢',
                    '中煤', '中材', '中铝', '中远', '中集', '中化', '中储', '中信',
                    '中纺', '中粮', '中国建筑', '中国铁建', '中国中铁', '中国交建',
                    '中国电建', '中国能建', '中国核建', '中国铁路', '中国电子',
                    '中国航天', '中国航空', '中国兵器', '中国船舶', '中国通用',
                    '中国一重', '中国二重', '中国三峡', '中国华能', '中国大唐',
                    '中国华电', '中国国电', '中国电信', '中国联通', '中国移动'
                ];

                if (centralEnterprises.some(prefix => companyName.startsWith(prefix))) {
                    return '中字头';
                }                

                // 如果有企业地址信息，优先使用地址判断
                if (bid.corp_addr && bid.corp_addr.province) {
                    return bid.corp_addr.province === '湖南省' ? '湖南省内' : '其他省外';
                }

                // 检查是否为湖南省内单位 (降级策略：按名称判断)
                if (companyName.includes('湖南') || 
                    hunanCities.some(city => companyName.includes(city))) {
                    return '湖南省内';
                }

                // 其他省外单位
                return '其他省外';
            }

            function createScatterChart(bids, maxPrice) {
                const ctx = document.getElementById('scatterChart').getContext('2d');
                const companyDatasets = {};
                
                bids.forEach(bid => {
                    const type = getCompanyType(bid);
                
                    if (!companyDatasets[type]) {
                        companyDatasets[type] = {
                            label: type,
                            data: [],
                            backgroundColor: colors[type],  // 使用统一的颜色定义
                            pointRadius: 8,
                            pointHoverRadius: 10
                        };
                    }
                    companyDatasets[type].data.push({
                        x: Math.floor(bid.bid_down_ratio * 100),
                        y: (bid.bid_down_ratio * 100) % 1 * 100,
                        bid_corp_name: bid.bid_corp_name,
                        bid_down_ratio: bid.bid_down_ratio
                    });
                });
            
                if (scatterChart instanceof Chart) {
                    scatterChart.destroy();
                }
            
                scatterChart = new Chart(ctx, {
                    type: 'scatter',
                    data: {
                        datasets: Object.values(companyDatasets)
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: {
                            x: {
                                title: {
                                    display: true,
                                    text: '下浮率整数部分 (%)'
                                },
                                ticks: {
                                    callback: value => `${value}%`
                                }
                            },
                            y: {
                                title: {
                                    display: true,
                                    text: '下浮率小数部分'
                                },
                                ticks: {
                                    callback: value => `${(value/100).toFixed(2)}`
                                }
                            }
                        },
                        plugins: {
                            tooltip: {
                                callbacks: {
                                    label: (context) => {
                                        const point = context.raw;
                                        return [
                                            `单位: ${point.bid_corp_name}`,
                                            `下浮率: ${(point.bid_down_ratio * 100).toFixed(2)}%`
                                        ];
                                    }
                                }
                            },
                            legend: {
                                position: 'right',
                                labels: {
                                    boxWidth: 10
                                }
                            }
                        }
                    }
                });
            }

            // 获取URL参数中的hnggzy_id作为projectId
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('hnggzy_id');

            if (!projectId) {
                alert('请提供项目ID！');
                return;
            }

            // 绑定按钮点击事件
            $('#pubButton').click(function() {
                const pubUrl = window.project_pub_url;
                if (pubUrl) {
                    window.open(pubUrl, '_blank');
                } else {
                    alert('未找到招标公示链接');
                }
            });
            $('#analysisButton').click(function() {
                // 获取ajax返回的数据
                const maxPrice = $('#maxPrice').text().replace(/[^0-9.]/g, '');
                const bids = sortedBids.map(bid => bid.bid_price).join(',');
                const stats = sortedBids.map(bid => bid.bid_stat || '').join(',');

                // 解析六参数
                const params = parse6Params(window.bid_6param) || {};
                const {a, b, c, d, e, f, g, C1, r} = params;

                // 构建跳转URL，添加六参数
                const url = `https://pages.liubeijs.com/cal65.html?maxPrice=${maxPrice}&bids=${bids}&stats=${encodeURIComponent(stats)}`
                    + `&a=${a || ''}&b=${b || ''}&c=${c || ''}&d=${d || ''}&e=${e || ''}&f=${f || ''}&g=${g || ''}`
                    + `&C1=${C1 || ''}&r=${r || ''}`;
                
                // 跳转到新页面
                window.open(url, '_blank');
            });

            // 统一的数据加载函数
            function loadProjectData() {
                // 增加对本地调试的支持
                const baseUrl = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost') 
                    ? 'http://localhost' 
                    : 'https://liubeijs.com';

                // 添加加载状态提示
                $('#projectTitle').html('<div class="spinner-border spinner-border-sm me-2" role="status"></div>项目信息加载中...');
                
                $.ajax({
                    url: `${baseUrl}/api/project?hnggzy_id=${projectId}`,
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    success: function(response) {
                        // 兼容直接返回对象和返回 {data: ...} 的情况
                        let project = response.data || response;
                        // 如果是数组，取第一个元素
                        if (Array.isArray(project)) {
                            project = project[0];
                        }
                        
                        // 更新项目基本信息
                        $('#projectTitle').text(project.project_name);
                        $('#projectId').text(project.hnggzy_id);
                        $('#maxPrice').text(project.project_max_price.toLocaleString('zh-CN', {
                            style: 'currency',
                            currency: 'CNY'
                        }));

                        // 填充新增字段
                        $('#projectType').text(project.hnggzy_type || '-');
                        $('#evalMethod').text(project.evaluation_method || '-');
                        // 计算基准价及其下浮率
                        if (project.project_base_price) {
                            const basePrice = parseFloat(project.project_base_price);
                            let basePriceText = basePrice.toLocaleString('zh-CN', {
                                style: 'currency',
                                currency: 'CNY'
                            });
                            
                            // 如果有最高限价，计算下浮率
                            if (project.project_max_price) {
                                const maxPrice = parseFloat(project.project_max_price);
                                if (maxPrice > 0) {
                                    const ratio = ((maxPrice - basePrice) / maxPrice) * 100;
                                    basePriceText += ` (${ratio.toFixed(2)}%)`;
                                }
                            }
                            $('#basePrice').text(basePriceText);
                        } else {
                            $('#basePrice').text('-');
                        }
                        $('#floatRange').text(project.bid_floating_range || '-');

                        // 处理项目地点
                        let placeStr = '-';
                        if (project.project_place) {
                            if (typeof project.project_place === 'object') {
                                const p = project.project_place;
                                placeStr = [p.province, p.city, p.district].filter(Boolean).join('/');
                            } else {
                                placeStr = project.project_place;
                            }
                        }
                        $('#projectPlace').text(placeStr);

                        // 处理抽取参数
                        const params = parse6Params(project.bid_6param);
                        if (params) {
                            const {C1, r, ...others} = params;
                            const labelMap = {
                                'a': '算术平均数随机权重a',
                                'b': '中位数随机权重b',
                                'c': '四分位数随机权重c',
                                'd': '几何平均数随机权重d',
                                'e': '算术平均数随机权重e',
                                'f': '中位数随机权重f',
                                'g': '几何平均数随机权重g'
                            };

                            const tooltipText = Object.entries(others)
                                .map(([k, v]) => `${labelMap[k] || k}: ${v}`)
                                .join('<br>');

                            const html = `
                                <span class="me-3">比例系数C1: ${C1 !== undefined ? C1 : '-'}</span>
                                <span class="me-3">下浮系数r: ${r !== undefined ? r : '-'}</span>
                                <i class="bi bi-info-circle text-primary" style="cursor: pointer;" data-bs-toggle="tooltip" data-bs-html="true" title="${tooltipText}"></i>
                            `;
                            $('#bidParams').html(html);
                        } else {
                            $('#bidParams').text('-');
                        }

                        // 初始化所有 tooltip
                        if (typeof bootstrap !== 'undefined' && bootstrap.Tooltip) {
                            var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
                            var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
                                return new bootstrap.Tooltip(tooltipTriggerEl)
                            })
                        }
                        
                        // 格式化并显示开标时间
                        if (project.bid_openning_time) {
                            const openTime = new Date(project.bid_openning_time);
                            const formattedTime = openTime.toLocaleDateString('zh-CN', {
                                year: 'numeric',
                                month: '2-digit',
                                day: '2-digit'
                            }).replace(/\//g, '-'); // 确保格式为 YYYY-MM-DD
                            $('#bidOpenTime').text(formattedTime);
                        } else {
                            $('#bidOpenTime').text('-');
                        }
                        
                        // 保存六参数/招标公示到全局变量
                        window.bid_6param = project.bid_6param;
                        window.project_pub_url = project.project_pub_url;
                        window.bid_openning_time = project.bid_openning_time;

                        // 对投标数据按序号排序（从小到大）
                        sortedBids = project.project_bids
                            .filter(bid => bid.bid_price !== null)
                            .sort((a, b) => (parseInt(a.bid_id) || 0) - (parseInt(b.bid_id) || 0));

                        renderBidList(sortedBids);
                        createScatterChart(sortedBids, project.project_max_price);

                        // 自动加载区域分析数据
                        analyzeRegions();
                        
                        // 自动加载信用评分
                        analyzeScores();
                    },
                    error: function(xhr, status, error) {
                        let errorMessage = '加载失败';
                        if (xhr.status === 403) {
                            errorMessage = '访问被拒绝，请检查访问权限';
                        } else if (xhr.status === 0) {
                            errorMessage = '无法连接到服务器，请检查网络连接';
                        }
                        
                        $('#projectTitle').html(`
                            <div class="text-danger">
                                <i class="bi bi-exclamation-triangle me-2"></i>${errorMessage}
                            </div>
                        `);
                        console.error('加载数据失败：', {status: xhr.status, error: error});
                    }
                });
            }

            // 通用排序处理函数
            function handleSort(btn, compareFn, defaultDesc = false) {
                // 切换激活状态和方向
                if (!btn.hasClass('active')) {
                    $('.btn-group .btn').removeClass('active');
                    btn.addClass('active');
                    // 新激活时，使用默认排序方向
                    btn.data('dir', defaultDesc ? 'desc' : 'asc');
                } else {
                    // 已激活，切换方向
                    const currentDir = btn.data('dir');
                    btn.data('dir', currentDir === 'asc' ? 'desc' : 'asc');
                }

                const dir = btn.data('dir');
                
                // 更新图标（仅针对序号排序）
                if (btn.attr('id') === 'sortById') {
                    const icon = btn.find('i');
                    icon.removeClass('bi-sort-numeric-down bi-sort-numeric-up');
                    icon.addClass(dir === 'asc' ? 'bi-sort-numeric-down' : 'bi-sort-numeric-up');
                }

                // 执行排序
                sortedBids.sort((a, b) => {
                    const result = compareFn(a, b);
                    return dir === 'asc' ? result : -result;
                });

                renderBidList(sortedBids);
                createScatterChart(sortedBids);
            }

            // 修改排序事件处理
            $('#sortById').click(function() {
                handleSort($(this), (a, b) => {
                    return (parseInt(a.bid_id) || 0) - (parseInt(b.bid_id) || 0);
                }, false); // 默认升序
            });

            $('#sortByRatio').click(function() {
                handleSort($(this), (a, b) => {
                    return a.bid_down_ratio - b.bid_down_ratio;
                }, true); // 默认降序
            });

            $('#sortByRegion').click(function() {
                handleSort($(this), (a, b) => {
                    const provinceA = a.corp_addr?.province || '';
                    const provinceB = b.corp_addr?.province || '';
                    
                    if (provinceA !== provinceB) {
                        return provinceA.localeCompare(provinceB);
                    }

                    if (provinceA === '湖南省') {
                        const cityA = a.corp_addr?.city || '';
                        const cityB = b.corp_addr?.city || '';
                        if (cityA !== cityB) {
                             return cityA.localeCompare(cityB);
                        }
                    }
                    
                    return a.bid_price - b.bid_price;
                }, false); // 默认升序
            });

            $('#sortByScore').click(function() {
                handleSort($(this), (a, b) => {
                    const scoreA = parseFloat(a.score) || 0;
                    const scoreB = parseFloat(b.score) || 0;
                    
                    if (scoreA !== scoreB) {
                        return scoreA - scoreB;
                    }
                    return a.bid_price - b.bid_price;
                }, true); // 默认降序
            });
            $('thead th:nth-child(2)').html('投标单位');
            
            // 初始加载数据
            loadProjectData();
        });
        // 绑定省中心阳光房按钮点击事件
        $('#sunshineRoomButton').click(function() {
            const projectName = $('#projectTitle').text().substring(0, 20); // 获取项目名字的前20个字符
            const url = `http://yyjc.hnsdzjy.org:20005/sun/project?searchValue=${encodeURIComponent(projectName)}&searchType=projectInfo`;
            window.open(url, '_blank');
        });


// 处理三点菜单的点击事件
$(document).on('click', '.menu-trigger', function(e) {
    e.stopPropagation(); // 阻止事件冒泡
    const $buttons = $(this).next('.icon-buttons');
    $('.icon-buttons').not($buttons).removeClass('show'); // 关闭其他打开的按钮组
    $buttons.toggleClass('show');
});

// 点击页面其他地方时关闭按钮组
$(document).on('click', function(e) {
    if (!$(e.target).closest('.icon-buttons').length && !$(e.target).closest('.menu-trigger').length) {
        $('.icon-buttons').removeClass('show');
    }
});
        

        // 添加复制功能
        $(document).on('click', '.copy-name', function(e) {
            e.preventDefault();
            const companyName = $(this).data('company');
            
            // 创建临时文本区域
            const textarea = document.createElement('textarea');
            textarea.value = companyName;
            document.body.appendChild(textarea);
            
            // 选择文本并复制
            textarea.select();
            document.execCommand('copy');
            
            // 移除临时文本区域
            document.body.removeChild(textarea);
            
            // 显示复制成功提示（可选）
            const originalTitle = $(this).attr('title');
            $(this).attr('title', '复制成功！');
            setTimeout(() => {
                $(this).attr('title', originalTitle);
            }, 1000);
        });


            // 处理菜单显示和隐藏
    $(document).on('mouseenter', '.menu-trigger', function(e) {
        const $menu = $(this).next('.dropdown-menu');
        const $trigger = $(this);
        
        // 获取触发器的位置和尺寸
        const triggerPos = $trigger.offset();
        const triggerHeight = $trigger.outerHeight();
        
        // 设置菜单位置
        $menu.css({
            top: triggerPos.top + triggerHeight,  // 紧贴触发器底部
            left: triggerPos.left + $trigger.outerWidth() / 2  // 水平居中对齐
        }).addClass('show');
    });

    // 鼠标离开菜单时隐藏
    $(document).on('mouseleave', '.dropdown-menu', function() {
        $(this).removeClass('show');
    });

    // 鼠标离开触发器但进入菜单时保持菜单显示
    $(document).on('mouseleave', '.menu-trigger', function(e) {
        const $menu = $(this).next('.dropdown-menu');
        const menuPos = $menu.offset();
        const menuWidth = $menu.width();
        const menuHeight = $menu.height();
        
        if (!(e.pageX >= menuPos.left && 
              e.pageX <= menuPos.left + menuWidth && 
              e.pageY >= menuPos.top && 
              e.pageY <= menuPos.top + menuHeight)) {
            $menu.removeClass('show');
        }
    });



    </script>
